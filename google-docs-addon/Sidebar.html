<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      :root {
        color: #201b16;
        font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", system-ui, sans-serif;
        background: #f7f3ec;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 12px;
        background: #f7f3ec;
      }

      h1,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 8px;
        font-size: 18px;
      }

      button {
        min-height: 38px;
        border: 1px solid #c9bba7;
        border-radius: 7px;
        padding: 8px 10px;
        color: #1f1a15;
        background: #fffdf8;
        cursor: pointer;
        font: inherit;
      }

      button.primary {
        border-color: #2d5f8b;
        color: #fff;
        background: #2d5f8b;
      }

      .status {
        min-height: 20px;
        margin: 0 0 12px;
        color: #2d5f8b;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.6;
      }

      .panel {
        display: grid;
        gap: 10px;
        border: 1px solid #ddd1bf;
        border-radius: 8px;
        padding: 12px;
        background: rgba(255, 253, 248, 0.94);
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .stat {
        min-height: 44px;
        display: grid;
        place-items: center;
        border-radius: 7px;
        padding: 8px;
        background: #efe6d7;
        color: #44382b;
        font-size: 11px;
        font-weight: 700;
        text-align: center;
      }

      .stat strong {
        display: block;
        font-size: 15px;
      }

      .muted {
        margin: 0;
        color: #746754;
        font-size: 12px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <h1>Umbrella Parade Writer</h1>
    <p id="status" class="status">別画面Writerを開いています...</p>

    <section class="panel">
      <div class="actions">
        <button class="primary" id="sync-external">別画面へ同期</button>
        <button id="open-external">別画面で開く</button>
      </div>

      <div class="stats" aria-label="原稿情報">
        <div class="stat"><strong id="stat-chars">0</strong>文字</div>
        <div class="stat"><strong id="stat-headings">0</strong>見出し</div>
        <div class="stat"><strong id="stat-links">0</strong>リンク</div>
      </div>

      <p class="muted">Docs本文の確認は別画面Writerで行います。このパネルは同期だけに使います。</p>
    </section>

    <script>
      const WRITER_URL = 'https://umbrellaparade.github.io/umbrella-parade-writer/?docsBridge=1';
      const WRITER_ORIGIN = 'https://umbrellaparade.github.io';
      let writerWindow = null;
      let snapshot = null;
      let isRefreshing = false;
      let pendingRefresh = false;

      const statusEl = document.getElementById('status');

      document.getElementById('open-external').addEventListener('click', () => openExternalWriter({ userAction: true }));
      document.getElementById('sync-external').addEventListener('click', syncExternalWriter);

      openExternalWriter({ userAction: false });
      refreshSnapshot({ postAfterLoad: true });

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function openExternalWriter(options) {
        writerWindow = window.open(WRITER_URL, 'umbrella-parade-writer-docs-preview');
        if (!writerWindow) {
          setStatus('自動で別画面を開けませんでした。「別画面で開く」を押してください。');
          return false;
        }

        setStatus(options && options.userAction ? '別画面Writerを開きました' : '別画面Writerを開いています...');
        if (snapshot) postSnapshotToWriter({ retry: true });
        return true;
      }

      function syncExternalWriter() {
        if (!writerWindow || writerWindow.closed) {
          if (!openExternalWriter({ userAction: true })) return;
        }

        setStatus('別画面へ同期しています...');
        refreshSnapshot({ postAfterLoad: true });
      }

      function refreshSnapshot(options) {
        if (isRefreshing) {
          pendingRefresh = true;
          return;
        }

        isRefreshing = true;
        google.script.run
          .withSuccessHandler((nextSnapshot) => {
            isRefreshing = false;
            snapshot = nextSnapshot;
            renderStats();
            setStatus(`${snapshot.title} を読み込みました`);
            if (options && options.postAfterLoad) postSnapshotToWriter({ retry: true });
            if (pendingRefresh) {
              pendingRefresh = false;
              refreshSnapshot({ postAfterLoad: true });
            }
          })
          .withFailureHandler((error) => {
            isRefreshing = false;
            setStatus(error.message || '読み込みに失敗しました');
          })
          .getDocumentSnapshot();
      }

      function renderStats() {
        if (!snapshot) return;
        document.getElementById('stat-chars').textContent = Number(snapshot.characterCount || 0).toLocaleString();
        document.getElementById('stat-headings').textContent = Array.isArray(snapshot.toc)
          ? snapshot.toc.length.toLocaleString()
          : '0';
        document.getElementById('stat-links').textContent = Array.isArray(snapshot.links)
          ? snapshot.links.length.toLocaleString()
          : '0';
      }

      function postSnapshotToWriter(options) {
        if (!writerWindow || writerWindow.closed || !snapshot) return;

        const payload = {
          source: 'umbrella-parade-docs-addon',
          type: 'docsSnapshot',
          snapshot,
        };

        writerWindow.postMessage(payload, WRITER_ORIGIN);
        if (options && options.retry) {
          window.setTimeout(() => writerWindow && !writerWindow.closed && writerWindow.postMessage(payload, WRITER_ORIGIN), 900);
          window.setTimeout(() => writerWindow && !writerWindow.closed && writerWindow.postMessage(payload, WRITER_ORIGIN), 1800);
        }
      }
    </script>
  </body>
</html>
